name: finflow_agent
description: FinFlow Pro Agent App — Streamlined app for field agents to process client transactions, track commissions, and communicate with admin.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ─── Networking ────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # ─── Navigation ────────────────────────────────────────────
  go_router: ^14.6.2

  # ─── Storage ───────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # ─── UI & Design System ───────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_animate: ^4.5.0

  # ─── Charts & Data Visualization ──────────────────────────
  fl_chart: ^0.69.0

  # ─── PDF & Printing ───────────────────────────────────────
  pdf: ^3.11.2
  printing: ^5.13.3

  # ─── Date & Formatting ────────────────────────────────────
  intl: ^0.19.0

  # ─── Media ─────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ─── Notifications ────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ─── Utilities ─────────────────────────────────────────────
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  logger: ^2.5.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # ─── Material Design ──────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
